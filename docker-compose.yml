services:
  m3u-manager:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/app.db
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      VALIDATION_TIMEOUT_SECONDS: 10
      VALIDATION_CONCURRENCY: 3
      VALIDATION_RETRIES: 1
    volumes:
      - m3u-data:/data
    restart: unless-stopped

volumes:
  m3u-data:
